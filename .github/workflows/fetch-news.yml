name: Fetch News (10x Daily)

on:
  schedule:
    # 10x daily during market hours (UTC times, EST = UTC-5 in winter / UTC-4 in summer)
    # 12,14,15,17,18,19,20,21,23,1 UTC = 7am,9am,10am,12pm,1pm,2pm,3pm,4pm,6pm,8pm EST
    - cron: '0 12 * * *'
    - cron: '0 14 * * *'
    - cron: '0 15 * * *'
    - cron: '0 17 * * *'
    - cron: '0 18 * * *'
    - cron: '0 19 * * *'
    - cron: '0 20 * * *'
    - cron: '0 21 * * *'
    - cron: '0 23 * * *'
    - cron: '0 1 * * *'

  # Manual trigger for testing
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Fetch news from Market Mountain API
        run: |
          SITE_URL="${{ secrets.SITE_URL }}"
          if [ -z "$SITE_URL" ]; then
            SITE_URL="https://marketmountainfinance.com"
          fi

          echo "Triggering news fetch at $SITE_URL/api/fetch-news"

          # Capture both response body and HTTP status code
          body=$(curl -s \
            --max-time 90 \
            -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.FETCH_NEWS_SECRET }}" \
            -H "Content-Type: application/json" \
            "$SITE_URL/api/fetch-news")

          # Split status from body
          http_code=$(echo "$body" | tail -n1)
          response_body=$(echo "$body" | head -n -1)

          echo "Response status: $http_code"
          echo "Response body: $response_body"

          if [ "$http_code" != "200" ]; then
            echo "::error::API returned HTTP $http_code"
            exit 1
          fi

          # Fail on success:false even when HTTP 200
          if echo "$response_body" | grep -q '"success":false'; then
            error_msg=$(echo "$response_body" | grep -o '"error":"[^"]*"' | head -1)
            echo "::error::API returned success:false — $error_msg"
            exit 1
          fi

          # Log stories posted count
          posted=$(echo "$response_body" | grep -o '"posted":[0-9]*' | head -1)
          suppressed=$(echo "$response_body" | grep -o '"crossRunSuppressed":[0-9]*' | head -1)
          published=$(echo "$response_body" | grep -o '"publishDecision":"[^"]*"' | head -1)
          echo "Stories posted: $posted | Cross-run suppressed: $suppressed | $published"
          echo "News fetch completed successfully"
